<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex Projects</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #ecfff3;
      background: #06130a;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      width: min(860px, calc(100% - 40px));
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(40px, 8vw, 86px);
      line-height: 0.95;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 28px;
      color: rgba(236, 255, 243, 0.72);
      line-height: 1.8;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }
    a {
      display: block;
      min-height: 148px;
      padding: 22px;
      border: 1px solid rgba(236, 255, 243, 0.16);
      border-radius: 18px;
      color: inherit;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.06);
    }
    a strong {
      display: block;
      margin-bottom: 10px;
      font-size: 24px;
    }
    a span {
      color: rgba(236, 255, 243, 0.68);
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <main>
    <h1>Codex Projects</h1>
    <p>Codex-built tools, prototypes, and reusable AI workflows.</p>
    <div class="grid">
      <a href="./skillbox/">
        <strong>颜汝的 AI 技能库</strong>
        <span>一个可检索、可组合、可调用的 AI skills 与 MCP 能力网站。</span>
      </a>
      <a href="./advisor-council-studio/">
        <strong>Advisor Council Studio</strong>
        <span>五人顾问商业思考工作台，把问题变成建议和渠道文案。</span>
      </a>
    </div>
  </main>
</body>
</html>
