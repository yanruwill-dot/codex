<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Get笔记得到大脑预览</title>
  <desc id="desc">一个展示保存、搜索、知识库复用的 GetNote 工作台视觉图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6f0"/>
      <stop offset="1" stop-color="#f8f5ea"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d6848"/>
      <stop offset="1" stop-color="#17a36b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#122018" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="1010" cy="110" r="132" fill="#dbeaf2" opacity=".72"/>
  <circle cx="148" cy="684" r="180" fill="#dff1e6" opacity=".84"/>
  <g filter="url(#shadow)">
    <rect x="110" y="86" width="980" height="628" rx="34" fill="#fff" stroke="#dfe6dc"/>
  </g>
  <rect x="150" y="128" width="210" height="70" rx="18" fill="url(#green)"/>
  <text x="184" y="158" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#fff">GET NOTE</text>
  <text x="184" y="184" font-family="Arial, sans-serif" font-size="18" fill="#dbfff0">得到大脑</text>
  <rect x="390" y="138" width="560" height="48" rx="24" fill="#fbfcfa" stroke="#dfe6dc"/>
  <text x="426" y="169" font-family="Arial, sans-serif" font-size="20" fill="#66736b">搜索文章、截图、课程素材、客户问题...</text>
  <g>
    <rect x="150" y="242" width="260" height="154" rx="20" fill="#fbfcfa" stroke="#dfe6dc"/>
    <text x="180" y="288" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#17201b">保存</text>
    <text x="180" y="324" font-family="Arial, sans-serif" font-size="20" fill="#657168">链接 / 图片 / 文字</text>
    <path d="M180 354 H344" stroke="#128158" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g>
    <rect x="470" y="242" width="260" height="154" rx="20" fill="#fbfcfa" stroke="#dfe6dc"/>
    <text x="500" y="288" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#17201b">召回</text>
    <text x="500" y="324" font-family="Arial, sans-serif" font-size="20" fill="#657168">语义搜索 / 标签</text>
    <path d="M500 354 H664" stroke="#37678f" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g>
    <rect x="790" y="242" width="260" height="154" rx="20" fill="#fbfcfa" stroke="#dfe6dc"/>
    <text x="820" y="288" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#17201b">复用</text>
    <text x="820" y="324" font-family="Arial, sans-serif" font-size="20" fill="#657168">文章 / 课程 / 工作流</text>
    <path d="M820 354 H984" stroke="#b8842b" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g>
    <rect x="150" y="448" width="900" height="72" rx="18" fill="#fff" stroke="#dfe6dc"/>
    <rect x="180" y="468" width="104" height="32" rx="10" fill="#e8f4ed"/>
    <text x="202" y="490" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#0d6848">文章素材</text>
    <text x="318" y="492" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#17201b">公众号选题和案例库</text>
    <text x="900" y="492" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#128158">已沉淀</text>
  </g>
  <g>
    <rect x="150" y="542" width="900" height="72" rx="18" fill="#fff" stroke="#dfe6dc"/>
    <rect x="180" y="562" width="104" height="32" rx="10" fill="#e7eef5"/>
    <text x="202" y="584" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#37678f">截图图片</text>
    <text x="318" y="586" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#17201b">课程、对标图和海报参考</text>
    <text x="900" y="586" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#128158">可召回</text>
  </g>
  <text x="150" y="674" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#17201b">素材不是堆起来，而是变成 AI 能读懂、能搜索、能复用的资产。</text>
</svg>
