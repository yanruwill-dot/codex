<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>颜汝能力看台</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --line: #dfe5dc;
      --line-strong: #b8cabc;
      --ink: #18211c;
      --muted: #66736b;
      --soft: #eef4ee;
      --green: #128158;
      --green-dark: #0e6647;
      --gold: #b88528;
      --red: #c95345;
      --blue: #37678f;
      --shadow: 0 16px 36px rgba(18, 36, 24, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(246, 247, 244, 0.94), rgba(246, 247, 244, 1)),
        radial-gradient(circle at 18% 12%, rgba(18, 129, 88, 0.12), transparent 28%),
        radial-gradient(circle at 88% 6%, rgba(184, 133, 40, 0.12), transparent 25%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 66px 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: 250px minmax(260px, 1fr) auto;
      align-items: center;
      gap: 22px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #111714, #1d8a61);
      font-weight: 800;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
    }

    .brand h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .search {
      position: relative;
      max-width: 560px;
      min-width: 220px;
    }

    .search input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 44px;
      outline: 0;
      background: #fff;
      color: var(--ink);
      box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.02);
    }

    .search input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(18, 129, 88, 0.12);
    }

    .search::before {
      content: "⌕";
      position: absolute;
      left: 16px;
      top: 7px;
      color: var(--muted);
      font-size: 21px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .top-action {
      height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 10px;
      background: transparent;
      color: var(--ink);
    }

    .top-action:hover {
      background: var(--soft);
      border-color: var(--line);
    }

    .avatar-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .main {
      display: grid;
      grid-template-columns: 238px minmax(440px, 1fr) 492px;
      min-height: calc(100vh - 66px);
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      padding: 18px 14px;
    }

    .side-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 6px 10px;
      font-size: 14px;
      font-weight: 800;
    }

    .side-add {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .nav-list {
      display: grid;
      gap: 6px;
    }

    .nav-item {
      border: 0;
      width: 100%;
      min-height: 40px;
      border-radius: 8px;
      padding: 0 12px;
      background: transparent;
      color: var(--ink);
      display: grid;
      grid-template-columns: 26px 1fr auto;
      align-items: center;
      text-align: left;
      cursor: pointer;
    }

    .nav-item.active,
    .nav-item:hover {
      background: #e4f2ea;
      color: var(--green-dark);
    }

    .nav-icon {
      font-weight: 800;
      color: var(--green);
    }

    .nav-name {
      font-size: 14px;
      font-weight: 650;
    }

    .nav-count {
      color: var(--muted);
      font-size: 13px;
    }

    .side-section {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
    }

    .status-box {
      margin-top: 28px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .status-row b {
      color: var(--green);
    }

    .meter {
      height: 7px;
      border-radius: 999px;
      background: #e9ece8;
      overflow: hidden;
      margin: 8px 0 12px;
    }

    .meter span {
      display: block;
      width: 72%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--gold));
    }

    .content {
      padding: 18px 20px 22px;
      border-right: 1px solid var(--line);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .select-like,
    .filter-button,
    .view-button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 12px;
      color: var(--ink);
    }

    .select-like {
      color: var(--green-dark);
      font-weight: 750;
    }

    .view-switch {
      display: flex;
      gap: 6px;
    }

    .view-button.active {
      background: #dff0e6;
      border-color: var(--line-strong);
      color: var(--green-dark);
    }

    .cards {
      display: grid;
      gap: 14px;
    }

    .skill-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      padding: 14px;
      display: grid;
      grid-template-columns: 84px 1fr auto;
      gap: 16px;
      min-height: 158px;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(20, 30, 22, 0.04);
    }

    .skill-card:hover {
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
    }

    .skill-card.active {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(18, 129, 88, 0.1), var(--shadow);
    }

    .skill-logo {
      width: 84px;
      height: 84px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: #111714;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      padding: 8px;
      word-break: normal;
      overflow-wrap: normal;
    }

    .skill-logo.green {
      background: linear-gradient(145deg, #0e5a42, #1da06b);
    }

    .skill-logo.gold {
      background: linear-gradient(145deg, #2d2415, #b88528);
    }

    .skill-logo.blue {
      background: linear-gradient(145deg, #172735, #37678f);
    }

    .skill-logo.red {
      background: linear-gradient(145deg, #321918, #c95345);
    }

    .skill-logo.long-logo {
      font-size: 11px;
      letter-spacing: 0;
    }

    .card-main {
      min-width: 0;
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }

    .card-head h2 {
      font-size: 18px;
      line-height: 1.25;
      margin: 0;
    }

    .badge {
      min-height: 22px;
      border-radius: 7px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 750;
      background: #e8f3ec;
      color: var(--green-dark);
      border: 1px solid #cfe4d6;
    }

    .badge.warn {
      background: #fff5e6;
      color: #8b5b11;
      border-color: #ecd2a5;
    }

    .repo {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .desc {
      margin: 0;
      color: #2c3a31;
      font-size: 14px;
      line-height: 1.7;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }

    .tag {
      border: 1px solid var(--line);
      background: #fbfcfa;
      border-radius: 7px;
      padding: 4px 9px;
      color: #46524a;
      font-size: 12px;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: space-between;
      min-width: 64px;
      color: var(--muted);
      font-size: 13px;
    }

    .star {
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #fff;
      color: var(--gold);
    }

    .usage {
      display: grid;
      gap: 7px;
      text-align: right;
    }

    .usage span {
      white-space: nowrap;
    }

    .detail {
      padding: 26px 22px;
      background: rgba(255, 255, 255, 0.88);
      overflow: auto;
    }

    .detail-top {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .detail-logo {
      width: 92px;
      height: 92px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: #111714;
      font-weight: 900;
      text-align: center;
      line-height: 1.1;
      padding: 10px;
      word-break: normal;
      overflow-wrap: normal;
    }

    .detail-logo.long-logo {
      font-size: 12px;
    }

    .detail h2 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.22;
    }

    .detail .repo {
      margin-bottom: 8px;
    }

    .detail-close {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 24px;
      align-self: start;
      cursor: pointer;
    }

    .statline {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding: 4px 0 18px;
      margin-bottom: 20px;
    }

    .detail-section {
      margin: 0 0 20px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-title h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
    }

    .edit-mark {
      color: var(--muted);
      font-size: 18px;
    }

    .detail-section p,
    .detail-section li {
      color: #26332b;
      font-size: 14px;
      line-height: 1.75;
    }

    .detail-section p {
      margin: 0;
    }

    .detail-section ul {
      margin: 0;
      padding-left: 18px;
    }

    .prompt-box {
      border: 1px solid var(--line);
      background: #fbfcfa;
      border-radius: 8px;
      padding: 14px;
      color: #233029;
      font-size: 13px;
      line-height: 1.72;
      white-space: pre-wrap;
      overflow: auto;
      max-height: 172px;
    }

    .copy-button {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      margin-top: 16px;
    }

    .copy-button:hover {
      background: var(--green-dark);
    }

    .identity-card {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfa;
    }

    .identity-card img {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--line);
    }

    .identity-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .identity-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }

    .empty {
      display: none;
      padding: 56px 20px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      background: #fff;
    }

    @media (max-width: 1120px) {
      .topbar {
        grid-template-columns: 1fr;
        height: auto;
        padding: 14px 16px;
      }

      .top-actions {
        display: none;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .nav-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail {
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 720px) {
      .brand h1 {
        font-size: 20px;
      }

      .content {
        padding: 14px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .skill-card {
        grid-template-columns: 64px 1fr;
      }

      .skill-logo {
        width: 64px;
        height: 64px;
        font-size: 13px;
      }

      .skill-logo.long-logo {
        font-size: 9px;
      }

      .card-meta {
        grid-column: 1 / -1;
        flex-direction: row;
        align-items: center;
      }

      .detail-top {
        grid-template-columns: 72px 1fr auto;
      }

      .detail-logo {
        width: 72px;
        height: 72px;
        font-size: 13px;
      }

      .detail-logo.long-logo {
        font-size: 10px;
      }

      .detail h2 {
        font-size: 20px;
      }

      .nav-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">YR</div>
        <h1>颜汝能力看台</h1>
      </div>
      <label class="search" aria-label="搜索能力">
        <input id="searchInput" type="search" placeholder="搜索任务、场景或能力..." autocomplete="off">
      </label>
      <div class="top-actions" aria-label="看台操作">
        <button class="top-action" type="button">＋ 新建能力</button>

    <main class="main">
      <aside class="sidebar">
        <div class="side-title">
          <span>场景</span>
          <button class="side-add" type="button" aria-label="新增场景">+</button>
        </div>
        <nav class="nav-list" id="categoryNav" aria-label="能力分类"></nav>

        <div class="side-section">
          <div class="side-title"><span>视图</span></div>
          <div class="nav-list">
            <button class="nav-item secondary" type="button">
              <span class="nav-icon">◎</span><span class="nav-name">最近使用</span><span class="nav-count">12</span>

            <button class="nav-item secondary" type="button">

            <button class="nav-item secondary" type="button">
              <span class="nav-icon">□</span><span class="nav-name">待接 API</span><span class="nav-count">3</span>

        <div class="status-box">
          <div class="status-row"><span>知识库连接状态</span><b>已连接</b></div>

          <div class="status-row"><span>核心原则</span><span>判断变资产</span></div>
        </div>
      </aside>

      <section class="content">
        <div class="toolbar">
          <div class="filters">
            <button class="select-like" type="button" id="allButton">全部能力</button>
            <button class="filter-button" type="button" id="verifiedButton">已验证</button>
            <button class="filter-button" type="button" id="usableButton">可调用</button>
          </div>
          <div class="view-switch" aria-label="视图切换">
            <button class="view-button active" type="button">☷</button>
            <button class="view-button" type="button">▦</button>
          </div>
        </div>
        <div class="cards" id="cards"></div>
        <div class="empty" id="emptyState">没有匹配的能力。换个关键词试试。</div>
      </section>

      <aside class="detail" id="detail"></aside>
    </main>
  </div>

    let activeCategory = "all";
    let activeId = skills[0].id;
    let verifiedOnly = false;
    let usableOnly = false;

    const nav = document.getElementById("categoryNav");
    const cards = document.getElementById("cards");
    const detail = document.getElementById("detail");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const verifiedButton = document.getElementById("verifiedButton");
    const usableButton = document.getElementById("usableButton");
    const allButton = document.getElementById("allButton");

    function countByCategory(key) {
      if (key === "all") return skills.length;
      return skills.filter(skill => skill.category === key).length;
    }

    function renderNav() {
      nav.innerHTML = categories.map(category => `
        <button class="nav-item ${activeCategory === category.key ? "active" : ""}" type="button" data-category="${category.key}">
          <span class="nav-icon">${category.icon}</span>
          <span class="nav-name">${category.name}</span>
          <span class="nav-count">${countByCategory(category.key)}</span>
        </button>
      `).join("");

      nav.querySelectorAll("[data-category]").forEach(button => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          render();
        });
      });
    }

    function skillMatches(skill) {
      const query = searchInput.value.trim().toLowerCase();
      const haystack = [
        skill.name,
        skill.repo,
        skill.desc,
        skill.oneLine,
        skill.tags.join(" "),
        skill.moments.join(" ")
      ].join(" ").toLowerCase();

      return (activeCategory === "all" || skill.category === activeCategory)
        && (!verifiedOnly || skill.verified)
        && (!usableOnly || skill.usable)
        && (!query || haystack.includes(query));
    }

    function filteredSkills() {
      return skills.filter(skillMatches);
    }

    function logoClass(skill) {
      return skill.color ? ` ${skill.color}` : "";
    }

    function logoFitClass(skill) {
      return skill.logo.replace(/\\n|\n/g, "").length > 11 ? " long-logo" : "";
    }

    function formatLogo(logo) {
      return logo.replace(/\\n|\n/g, "<br>");
    }

    function promptText(skill) {
      return skill.prompt.replace(/\\n/g, "\n");
    }

    function renderCards() {
      const list = filteredSkills();
      if (!list.some(skill => skill.id === activeId) && list.length) {
        activeId = list[0].id;
      }

      cards.innerHTML = list.map(skill => `
        <article class="skill-card ${activeId === skill.id ? "active" : ""}" data-id="${skill.id}" tabindex="0" aria-label="${skill.name}">
          <div class="skill-logo${logoClass(skill)}${logoFitClass(skill)}">${formatLogo(skill.logo)}</div>
          <div class="card-main">
            <div class="card-head">
              <h2>${skill.name}</h2>
              <span class="badge ${skill.verified ? "" : "warn"}">${skill.verified ? "已验证" : "待验证"}</span>
            </div>
            <p class="repo">${skill.repo}</p>
            <p class="desc">${skill.desc}</p>
            <div class="tags">${skill.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}</div>
          </div>
          <div class="card-meta">
            <span class="star">☆</span>
            <div class="usage">
              <span>◎ ${skill.views}</span>
              <span>↻ ${skill.used}</span>
            </div>
          </div>
        </article>
      `).join("");

      emptyState.style.display = list.length ? "none" : "block";

      cards.querySelectorAll(".skill-card").forEach(card => {
        card.addEventListener("click", () => {
          activeId = card.dataset.id;
          renderCards();
          renderDetail();
        });
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            activeId = card.dataset.id;
            renderCards();
            renderDetail();
          }
        });
      });
    }

    function renderDetail() {
      const skill = skills.find(item => item.id === activeId) || filteredSkills()[0];
      if (!skill) {
        detail.innerHTML = "";
        return;
      }

      detail.innerHTML = `
        <div class="detail-top">
          <div class="detail-logo${logoClass(skill)}${logoFitClass(skill)}">${formatLogo(skill.logo)}</div>
          <div>
            <h2>${skill.name}</h2>
            <p class="repo">${skill.repo}</p>
            <div class="statline">
              <span>◎ ${skill.views}</span>
              <span>☆ ${skill.stars}</span>
              <span>更新：${skill.updated}</span>
            </div>
          </div>
          <button class="detail-close" type="button" aria-label="关闭详情">×</button>
        </div>

        <div class="detail-tags">${skill.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}<span class="tag">＋</span></div>

        <section class="detail-section">
          <div class="section-title">
            <h3>一句话能力</h3>
            <span class="edit-mark">⌁</span>
          </div>
          <p>${skill.oneLine}</p>
        </section>

        <section class="detail-section">
          <div class="section-title">
            <h3>什么时候想起它</h3>
            <span class="edit-mark">⌁</span>
          </div>
          <ul>${skill.moments.map(item => `<li>${item}</li>`).join("")}</ul>
        </section>

        <section class="detail-section">
          <div class="section-title">
            <h3>给 Codex/Claude 的调用提示</h3>
            <span class="edit-mark">⌁</span>
          </div>
          <div class="prompt-box" id="promptBox">${promptText(skill)}</div>
          <button class="copy-button" type="button" id="copyPrompt">复制调用提示</button>
        </section>

        <div class="identity-card">
          <img src="assets/yanru-avatar.png" alt="颜汝">
          <div>
            <strong>颜汝能力圈</strong>
            <p>不是工具清单，而是把内容、知识库、自动化、发布和复盘串成一套可持续生产系统。</p>
          </div>
        </div>
      `;

      detail.querySelector("#copyPrompt").addEventListener("click", async () => {
        const text = promptText(skill);
        try {
          await navigator.clipboard.writeText(text);
          detail.querySelector("#copyPrompt").textContent = "已复制";
          setTimeout(() => detail.querySelector("#copyPrompt").textContent = "复制调用提示", 1200);
        } catch (error) {
          const range = document.createRange();
          range.selectNodeContents(detail.querySelector("#promptBox"));
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
          detail.querySelector("#copyPrompt").textContent = "已选中提示词";
        }
      });
    }

    function render() {
      renderNav();
      renderCards();
      renderDetail();
      verifiedButton.classList.toggle("active", verifiedOnly);
      usableButton.classList.toggle("active", usableOnly);
    }

    searchInput.addEventListener("input", render);
    verifiedButton.addEventListener("click", () => {
      verifiedOnly = !verifiedOnly;
      render();
    });
    usableButton.addEventListener("click", () => {
      usableOnly = !usableOnly;
      render();
    });
    allButton.addEventListener("click", () => {
      activeCategory = "all";
      verifiedOnly = false;
      usableOnly = false;
      searchInput.value = "";
      render();
    });

    render();
  </script>
