<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>颜汝教学视频</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: #171f1a;
      background:
        radial-gradient(circle at 18% 10%, rgba(18, 129, 88, .14), transparent 30%),
        radial-gradient(circle at 82% 8%, rgba(184, 132, 43, .13), transparent 28%),
        linear-gradient(180deg, #f6f7f2 0%, #eef4ef 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1080px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 28px 0 46px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .brand,
    .back {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      font-weight: 900;
    }

    .brand {
      gap: 10px;
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #111714, #18865f);
    }

    .back {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(23, 31, 26, .12);
      border-radius: 999px;
      background: rgba(255, 255, 255, .7);
      color: #39463f;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 24px;
      align-items: start;
    }

    .copy {
      padding: 18px 0 0;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 7px 11px;
      color: #0d6547;
      background: #e3f2ea;
      border: 1px solid #c9e3d4;
      font-size: 12px;
      font-weight: 900;
    }

    h1 {
      margin: 18px 0 14px;
      max-width: 760px;
      font-size: clamp(38px, 6vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }

    .lead {
      max-width: 720px;
      margin: 0;
      color: #647169;
      font-size: 18px;
      line-height: 1.75;
    }

    .meta {
      display: grid;
      gap: 10px;
      padding: 18px;
      border: 1px solid rgba(23, 31, 26, .11);
      border-radius: 8px;
      background: rgba(255, 255, 255, .78);
      box-shadow: 0 16px 42px rgba(23, 31, 26, .08);
    }

    .meta b {
      font-size: 18px;
    }

    .meta span {
      color: #647169;
      line-height: 1.55;
    }

    .player-wrap {
      margin-top: 28px;
      display: grid;
      place-items: center;
    }

    .player {
      width: min(420px, 100%);
      border: 1px solid rgba(23, 31, 26, .14);
      border-radius: 8px;
      background: #101410;
      box-shadow: 0 22px 70px rgba(23, 31, 26, .18);
      overflow: hidden;
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 9 / 16;
      background: #101410;
    }

    .caption {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      color: #dfe9e1;
      background: #101410;
      font-size: 13px;
      line-height: 1.45;
    }

    .caption a {
      color: #bde8cf;
      font-weight: 800;
      white-space: nowrap;
      text-decoration: none;
    }

    @media (max-width: 760px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .player {
        width: min(100%, 390px);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="topbar">
      <a class="brand" href="../"><span class="mark">YR</span><span>颜汝 Codex 工作台</span></a>
      <a class="back" href="../">返回总入口</a>
    </nav>

    <section class="hero">
      <div class="copy">
        <span class="eyebrow">TEACHING VIDEO / CODEX</span>
        <h1>颜汝教学视频</h1>
        <p class="lead">Codex 同时测试 SolidWorks、AutoCAD、UGNX 的工业设计演示。开头已换成颜汝视觉，口播已换成颜汝声音 API 版本。</p>
      </div>
      <aside class="meta">
        <b>Codex 工业设计演示</b>
        <span>竖屏视频，58 秒，颜汝声线，全片可直接播放。</span>
        <span>适合放在课程演示、朋友圈素材和教学案例入口。</span>
      </aside>
    </section>

    <section class="player-wrap" aria-label="教学视频播放器">
      <div class="player">
        <video controls preload="metadata" poster="yanru-codex-industrial-design-demo.jpg">
          <source src="yanru-codex-industrial-design-demo.mp4" type="video/mp4">
          当前浏览器不支持直接播放这个视频。
        </video>
        <div class="caption">
          <span>颜汝声音 API 版 · Codex 工业设计演示</span>
          <a href="yanru-codex-industrial-design-demo.mp4" download>下载视频</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
